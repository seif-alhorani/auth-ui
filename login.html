<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <nav>
        <ul>
            <li><img class="logo" src="assets/images/eb14f761-7477-45e4-97af-ad0e4d4de779.jpg" alt=""></li>
            <li><a href="#">Home</a></li>
            <li><a href="#">News</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
        </ul>

    </nav>

    <div class="container">
        <div class="form-card">
            <h3>Login</h3>
            <form>
                <div>
                    <label for="email">Email address</label>
                    <input type="email" id="email" aria-describedby="emailHelp" placeholder="name@example.com" required>
                    <span>We'll never share your email with anyone else.</span>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="****" required>
                </div>
                <button type="submit">Login</button>
                <div class="form-link">
                    <a href="#">Forgot password?</a>
                    <a href="signup.html">Signup</a>
                </div>
            </form>
        </div>
        <div>
            <img class="LogoImage" src="assets/images/eb14f761-7477-45e4-97af-ad0e4d4de779.jpg" alt="">
        </div>
    </div>
</body>

</html>
