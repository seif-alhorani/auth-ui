<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/logo.jpg">
    <link href="./style/colors.css" rel="stylesheet">
    <link href="./style/style.css"  rel="stylesheet">
    
</head>

<body>
    <nav>
        <ul>
            <li>
                <img class="logo" src="./assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="home.html">Home</a></li>
            <li><a href="create.html">Create Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="form-card">
            <h3>Login</h3>
            <form id="loginform" onsubmit=" return validateLoginForm();">
                <div>
                    <label for="email">Email address</label>
                    <input type="text" id="email" aria-describedby="emailHelp" placeholder="name@example.com" >
                    <span>We'll never share your email with anyone else.</span>
                    <span id="emailError" class="error-message"></span>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="********" >
                    <span id="passwordError" class="error-message"></span>
                </div>
                <button type="submit" >Login</button>
                <div class="form-link">
                    <a href="#">Forgot password?</a>
                    <a href="signup.html">Signup</a>
                </div>
            </form>
        </div>
        <div>
            <img class="LogoImage" src="./assets/images/logo.jpg" alt="">
        </div>
    </div>
    <footer>
        <span id="copyright"></span> 
    </footer>
    <script src="./script/script-general.js"></script>
    <script src="./script/cookies.js"></script>
    <script src="./script/script-login.js"></script>
    <script src="./script/script-validation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
