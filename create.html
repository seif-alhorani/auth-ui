<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/colors.css">
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/style-create.css">
</head>

<body>
     <nav>
        <ul>
            <li>
                <img class="logo" src="./assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="home.html">Home</a></li>
            <li><a href="create.html">Create Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><button onclick="location.href='login.html'">Logout</button></li>
            <li><a href="profile.html"><img class="profile-pic" src="./assets/images/User.png" alt="profile-pic"></a>
            </li>
        </ul>
    </nav>
    <main>
        <section class="hero-section">
            <h1>Create New Blog</h1>
            <p>Share your thoughts with the world</p>
        </section>

        <section class="form-section">
            <div class="main-container">
                <form id="blogForm" class="blog-form">
                    <div class="input-group">
                        <label for="title">Blog Title</label>
                        <input type="text" id="title" placeholder="Enter title here..." required>
                    </div>

                    <div class="input-group">
                        <label>Blog Image</label>
                        <input type="url" id="imageUrl" placeholder="Paste image URL here">
                        <p style="text-align: center; margin: 10px 0; color: var(--text-muted-dark);">OR</p>
                        <input type="file" id="imageFile" accept="image/*">
                    </div>

                    <div class="input-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Tech">Technology</option>
                            <option value="Lifestyle">Lifestyle</option>
                            <option value="Travel">Travel</option>
                            <option value="Food">Food</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="content">Content</label>
                        <textarea id="content" placeholder="Write your blog content here..." required></textarea>
                    </div>

                    <button type="submit" class="publish-btn">Publish Blog</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <span> © 2026 Blog Platform</span>
    </footer>
    <script src="./script/script.js"></script>
    <script src="./script/script-create.js"></script>
</body>

</html>
