<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/logo.jpg">

    <link href="./style/colors.css" rel="stylesheet">
    <link href="../style/style.css" rel="stylesheet">
    <link rel="icon" href="../assets/images/logo.jpg">
</head>

<body>
    <nav>
        <ul>
            <li>
                <img class="logo" src="./assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="home.html">Home</a></li>
            <li><a href="create.html">Create Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            </li>
        </ul>
    </nav>
    <div class="container">
        <div class="form-card">
            <h3>Signup</h3>
            <form id="signform" onsubmit="return validateSignupForm()">
                <div class="mb-3">
                    <label for="fullname">Full Name</label>
                    <input type="text" class="form-control" id="fullname" placeholder="Full Name" >
                    <span id="nameError" class="error-message"></span>
                </div>
                <div class="mb-3">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" >
                    <span id="emailError" class="error-message"></span>
                </div>
                <div class="mb-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="********"   >
                    <span id="passwordError" class="error-message"></span>
                </div>
                <div class="mb-3">
                    <label for="cpassword">Confirm Password</label>
                    <input type="password" id="cpassword" placeholder="********" >
                    <span id="cpasswordError" class="error-message"></span>
                    <span id="notequalpasswordcpssword" class="error-message"></span>
                </div>
                <div class="mb-3">
                    <label for="phone">Phone Number</label>
                    <div style="display: inline-flex;">
                        <input type="text"  style="width:29%;"  placeholder="+962"  disabled>
                        <input type="text" class="form-control" id="phone" placeholder="" >
                    </div>
                    <span id="phoneError" class="error-message"></span>
                </div>

                <button type="submit" >Signup</button>
                <div>
                    <span>Already have an account? </span><a href="login.html">Login here</a>
                </div>
            </form>
        </div>
        <div>
            <img class="LogoImage" src="./assets/images/logo.jpg" alt="">
        </div>
    </div>

    <footer>
       <span id="copyright"></span> 
    </footer>
   
    <script src="./script/script-general.js"></script>
    <script src="./script/script-sign.js"></script>
    <script src="./script/script-validation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
