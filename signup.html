<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="./style/colors.css">
    <link href="./style/style.css" rel="stylesheet">
</head>

<body>
    <nav>
        <ul>
            <li>
                <img class="logo" src="./assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="home.html">Home</a></li>
            <li><a href="create.html">Create Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><button onclick="location.href='login.html'">Logout</button></li>
            <li><a href="profile.html"><img class="profile-pic" src="./assets/images/User.png" alt="profile-pic"></a>
            </li>
        </ul>
    </nav>
    <div class="container">
        <div class="form-card">
            <h3>Signup</h3>
            <form onsubmit="return validateSignupForm()">
                <div class="mb-3">
                    <label for="fullname">Full Name</label>
                    <input type="text" class="form-control" id="fullname" placeholder="Full Name" required>
                </div>
                <div class="mb-3">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="****" required>
                </div>
                <div class="mb-3">
                    <label for="cpassword">Confirm Password</label>
                    <input type="password" id="cpassword" placeholder="****" required>
                </div>

                <button type="submit" onclick="location.href='login.html'">Signup</button>
                <div>
                    <span>Already have an account? </span><a href="login.html">Login here</a>
                </div>
            </form>
        </div>
        <div>
            <img class="LogoImage" src="./assets/images/logo.jpg" alt="">
        </div>
    </div>

    <footer>
        <span> © 2026 Blog Platform</span>
    </footer>
    <script src="./script/scriptvalidation.js"></script>
</body>

</html>
