<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/style-contact.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function () {
            emailjs.init({
                publicKey: "3ziIY9u02e9LRrJ5o",
            });
        })();
    </script>
    
</head>

<body>
     <nav>
        <ul>
            <li>
                <img class="logo" src="./assets/images/logo.jpg" alt="Logo">
            </li>
            <li><a href="home.html">Home</a></li>
            <li><a href="create.html">Create Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><button onclick="location.href='login.html'">Logout</button></li>
            <li><a href="profile.html"><img class="profile-pic" src="./assets/images/User.png" alt="profile-pic"></a>
            </li>
        </ul>
    </nav>
    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1>Get In Touch</h1>
                <p>Have a question or just want to say hi? We'd love to hear from you!</p>
            </div>
        </section>

        <section>
            <div class="main-container">
                <div class="contact-info">
                    <h1>Contact Info</h1>
                    <div class="info-item">
                        <span class="material-symbols-outlined">alternate_email</span>
                        <div>
                            <h3>Email</h3>
                            <p><a href="mailto:support@blog.com" style="text-decoration: none; color: inherit;">support@blog.com</a></p>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="material-symbols-outlined">call</span>
                        <div>
                            <h3>Phone</h3>
                            <p><a href="tel:+96200000000" style="text-decoration: none; color: inherit;">+96200000000</a></p>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="material-symbols-outlined">location_searching</span>
                        <div>
                            <h3>Location</h3>
                            <p><a href="https://maps.app.goo.gl/8NZJ1WFGvXPXFD7t9" target="_blank" style="text-decoration: none; color: inherit;">Amman, Jordan</a></p>
                        </div>
                    </div>
                    <div class="info-item">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m17!1m12!1m3!1d3384.034267075755!2d35.893730076112504!3d31.987086523934526!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m2!1m1!2zMzHCsDU5JzEzLjUiTiAzNcKwNTMnNDYuNyJF!5e0!3m2!1sen!2sjo!4v1773577002104!5m2!1sen!2sjo" width="600" height="350px" style="border:solid 5px; margin-top: 10px; border-radius: 15px; width: 100%;box-shadow: 10px 10px rgb(37, 52, 57);" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
            
                </div>

                <div class="contact-form">
                    <h1>Contact Form</h1>
                    <form id ="formId" action="#" onsubmit="handleContactSubmit(event)">
                        <div class="input-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" placeholder="Name"  >
                            <span id="nameError" class="error-message"></span>
                        </div>
                        <div class="input-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="email@mail.com"  >
                            <span id="emailError" class="error-message"></span>
                        </div>
                        <div class="input-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" placeholder="How can we help?"  >
                            <span id="subjectError" class="error-message"></span>
                        </div>
                        <div class="input-group">
                            <label for="message">Message</label>
                            <textarea id="message" placeholder="Your message here..." ></textarea>
                            <span id="messageError" class="error-message"></span>
                        </div>
                        <button type="submit" class="submit-btn">
                            Send Message
                            <span class="material-symbols-outlined" >send</span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <span> © 2026 Blog Platform</span>
    </footer>
    <script src="./script/script.js"></script>
    <script src="./script/scriptsendmail.js"></script>
    <script src="./script/scriptvalidation.js"></script>
</body>

</html>
